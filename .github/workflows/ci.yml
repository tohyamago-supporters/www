name: CI

# 品質チェック (Lint / Format / 型チェック / テスト / E2E) の CI。
# 本来は pull_request で回すが、リポジトリ移管後に一部 PR で pull_request イベントが
# ワークフローを起動しない事象があったため、push でも走らせて確実に検証する。
# 二重実行は concurrency (同一ブランチは進行中の古い実行をキャンセル) で抑える。
# build ジョブだけは従来どおりフォーク由来 PR のときのみ実行する (下記 if。二重ビルド回避)。
on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      # 1 つのチェックが失敗しても他のチェック結果を確認できるようにする
      fail-fast: false
      matrix:
        task: ['format:check', 'lint', 'typecheck']
    name: quality (${{ matrix.task }})
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run ${{ matrix.task }}

  # テスト + カバレッジ計測。結果を Codecov へ送信しつつ、後段の coverage
  # ジョブが GitHub ネイティブのコードカバレッジ (Quality セクション) へ
  # 反映できるよう、カバレッジレポートをアーティファクトとして公開する。
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      # success 時のみアーティファクト化 (test が失敗すれば coverage ジョブも走らない)
      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/cobertura-coverage.xml

  # GitHub ネイティブのコードカバレッジ (PR の Quality セクション) へ反映する。
  # 現状この機能は public preview のため、当面は test ジョブの Codecov 連携も併存させる。
  # test の成功 (needs) を前提に、test が公開したアーティファクトからレポートする。
  coverage:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      code-quality: write
      # push (main) などで PR 番号を逆引きする場合に必要
      pull-requests: read
    steps:
      - name: Download coverage report artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
      - name: Report coverage to GitHub
        uses: actions/upload-code-coverage@v1
        with:
          file: cobertura-coverage.xml
          language: TypeScript
          label: code-coverage/vitest
          # fork PR など権限のない実行ではアクションが gracefully に抜けるが、
          # 念のためアップロード失敗で CI 全体を落とさない
          fail-on-error: false

  # フルビルド検証。同一リポジトリのブランチ/PR と main への push は Cloudflare の
  # プレビュー/本番ビルドが検証するため、ここでは Cloudflare が自動ビルドしない
  # フォーク由来の PR のときだけ実行し、二重ビルドを避ける。
  build:
    name: build
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  # 実ブラウザ E2E (jsdom では検証できない重なり順などの回帰確認)
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
